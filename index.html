<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        div {
            color: red;
            font-size: 20px;
            width: 200px;
            height: 100px;
            background-color: lightgray;
        }
        #mySpan {
            color: blue;
            font-size: 18px;
            width: 150px;
            height: 50px;
            background-color: lightyellow;
            display: inline-block; /* To apply width and height to span */
            
        }
    </style>
</head>
<body>
    <div>CSS Element Selector</div>
    <span id="mySpan">CSS ID Selector</span>
</body>
</html>
